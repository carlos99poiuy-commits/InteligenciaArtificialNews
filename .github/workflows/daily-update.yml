name: Daily AI News Update
on:
  schedule:
    # Every day at 10:00 AM UTC (4:00 AM CST Mexico)
    - cron: '0 10 * * *'
  workflow_dispatch: # Allow manual trigger

permissions: {}

jobs:
  update-news:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Run news updater
        run: python scripts/update-news.py

      - name: Validate HTML output
        run: python -c "import html.parser; p = html.parser.HTMLParser(); p.feed(open('index.html', encoding='utf-8').read()); print('HTML validation passed')"

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet index.html && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          DATE=$(date -u +"%Y-%m-%d")
          git commit -m "auto: daily news update ${DATE}"
          git push
