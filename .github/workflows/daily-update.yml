name: Daily AI News Update
on:
  schedule:
    # Every day at 7:00 AM UTC (1:00 AM CST Mexico)
    - cron: '0 7 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run news updater
        run: python scripts/update-news.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet index.html && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "AI PULSE Bot"
          git config user.email "bot@aipulse.local"
          git add index.html
          DATE=$(date -u +"%Y-%m-%d")
          git commit -m "auto: daily news update ${DATE}"
          git push
